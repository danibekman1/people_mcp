services:
  server:
    build: ./server
    container_name: shapes-server
    ports:
      - "8000:8000"
    healthcheck:
      # MCP streamable HTTP requires a session handshake, so probing /mcp
      # directly returns 400 even when the server is healthy. We probe the
      # listening TCP socket instead - good enough for compose ordering.
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8000)); s.close()\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  web:
    build: ./web
    container_name: shapes-web
    ports:
      - "3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_CHAT_MODEL=${CLAUDE_CHAT_MODEL:-claude-sonnet-4-6}
      - CLAUDE_TITLE_MODEL=${CLAUDE_TITLE_MODEL:-claude-haiku-4-5-20251001}
      - MCP_SERVER_URL=http://server:8000/mcp
    depends_on:
      server:
        condition: service_healthy
